name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # No dependencies to install: the queue is pure stdlib.
        # 3.9 is the minimum supported version (asyncio.to_thread).
        python-version: ['3.9', '3.11', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax-check all modules
        run: python -m compileall -q pyqueue config test

      - name: Run tests
        run: python -m unittest discover -s test -v
